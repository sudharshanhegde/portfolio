<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog — Sudharshan Hegde</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg:         #09090b;
            --surface:    #111118;
            --surface-2:  #1c1c26;
            --border:     rgba(255,255,255,0.07);
            --border-md:  rgba(255,255,255,0.12);
            --primary:    #a78bfa;
            --primary-bg: rgba(167,139,250,0.1);
            --accent:     #34d399;
            --accent-bg:  rgba(52,211,153,0.1);
            --text:       #f4f4f5;
            --text-muted: #a1a1aa;
            --text-dim:   #52525b;
            --ease:       cubic-bezier(0.4,0,0.2,1);
            --radius:     12px; --radius-lg: 18px;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', system-ui, sans-serif;
            line-height: 1.7; overflow-x: hidden;
        }
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* Navbar */
        .navbar {
            position: fixed; top:0; left:0; right:0; z-index:100;
            padding: 0 2rem; height: 64px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(9,9,11,0.85); backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
        }
        .navbar-brand {
            font-family: 'Fira Code', monospace; font-size: 0.95rem; font-weight: 500;
            color: var(--primary); text-decoration: none; letter-spacing: 0.5px;
        }
        .navbar-links { display:flex; gap:0.25rem; list-style:none; }
        .navbar-links a {
            color: var(--text-muted); text-decoration: none;
            padding: 0.45rem 0.9rem; border-radius: 8px;
            font-size: 0.875rem; font-weight: 500; transition: all 0.2s var(--ease);
        }
        .navbar-links a:hover { color: var(--text); background: var(--surface-2); }

        /* Hero */
        .blog-hero {
            padding: 8rem 0 4rem;
            position: relative; overflow: hidden; text-align: center;
        }
        .blog-hero::before {
            content: ''; position: absolute;
            width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, rgba(167,139,250,0.08), transparent 70%);
            top: -150px; left: 50%; transform: translateX(-50%);
            pointer-events: none;
        }
        .blog-hero-label {
            font-family: 'Fira Code', monospace; font-size: 0.78rem;
            color: var(--accent); text-transform: uppercase; letter-spacing: 2.5px;
            display: block; margin-bottom: 1rem; position: relative; z-index: 1;
        }
        .blog-hero h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(2.2rem, 4vw, 3.5rem);
            font-weight: 700; letter-spacing: -1.5px;
            line-height: 1.15; margin-bottom: 1rem;
            position: relative; z-index: 1;
        }
        .gradient-text {
            background: linear-gradient(135deg, #a78bfa, #6366f1, #34d399);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .blog-hero p {
            font-size: 1.05rem; color: var(--text-muted); max-width: 500px;
            margin: 0 auto; position: relative; z-index: 1; line-height: 1.8;
        }

        /* Search / filter bar */
        .filter-bar {
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 1rem;
            max-width: 1080px; margin: 0 auto 2.5rem; padding: 0 2rem;
            position: relative; z-index: 1;
        }
        .post-count {
            font-family: 'Fira Code', monospace; font-size: 0.8rem;
            color: var(--text-dim); letter-spacing: 0.5px;
        }
        .search-wrap {
            position: relative;
        }
        .search-wrap i {
            position: absolute; left: 0.85rem; top: 50%;
            transform: translateY(-50%); color: var(--text-dim); font-size: 0.8rem;
        }
        #search-input {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text); padding: 0.55rem 1rem 0.55rem 2.4rem;
            border-radius: 9px; font-size: 0.88rem; width: 220px;
            font-family: 'Inter', sans-serif; outline: none;
            transition: border-color 0.2s var(--ease);
        }
        #search-input::placeholder { color: var(--text-dim); }
        #search-input:focus { border-color: rgba(167,139,250,0.35); }

        /* Main container */
        .container {
            max-width: 1080px; margin: 0 auto;
            padding: 0 2rem; width: 100%; position: relative; z-index: 1;
        }

        /* Posts grid */
        .blog-section { padding-bottom: 5rem; }
        .posts-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(310px,1fr)); gap: 1.5rem;
        }

        .blog-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius-lg); padding: 1.6rem;
            text-decoration: none; display: flex; flex-direction: column; gap: 0.75rem;
            transition: all 0.28s var(--ease); cursor: pointer;
        }
        .blog-card:hover {
            border-color: rgba(167,139,250,0.22); transform: translateY(-4px);
            box-shadow: 0 16px 48px rgba(0,0,0,0.4);
        }
        .card-meta {
            display: flex; align-items: center; justify-content: space-between;
        }
        .card-date {
            font-family: 'Fira Code', monospace; font-size: 0.72rem;
            color: var(--text-dim); letter-spacing: 0.3px;
        }
        .card-tags { display:flex; flex-wrap:wrap; gap:0.3rem; }
        .card-tag {
            font-size: 0.7rem; color: var(--accent); background: var(--accent-bg);
            padding: 0.15rem 0.5rem; border-radius: 5px;
            border: 1px solid rgba(52,211,153,0.15);
            font-family: 'Fira Code', monospace;
        }
        .blog-card h3 {
            font-size: 1rem; font-weight: 600; color: var(--text); line-height: 1.5;
        }
        .blog-card p {
            font-size: 0.86rem; color: var(--text-muted); line-height: 1.7; flex:1;
        }
        .read-link {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.78rem; color: var(--primary); font-weight: 500;
            margin-top: auto; transition: gap 0.2s var(--ease);
        }
        .blog-card:hover .read-link { gap: 0.65rem; }

        /* Empty / loading */
        .state-msg {
            grid-column: 1/-1; text-align: center; padding: 3rem;
            color: var(--text-dim); font-size: 0.9rem;
        }
        .spinner {
            display: inline-block; width: 28px; height: 28px;
            border: 3px solid var(--border-md); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Admin FAB */
        .admin-fab {
            position: fixed; bottom: 2rem; right: 2rem; z-index: 200;
            width: 52px; height: 52px; border-radius: 50%;
            background: var(--primary); color: #09090b;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.3rem; text-decoration: none;
            box-shadow: 0 4px 20px rgba(167,139,250,0.4);
            transition: all 0.25s var(--ease);
        }
        .admin-fab:hover {
            background: #c4b5fd; transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(167,139,250,0.55);
        }

        /* Footer */
        footer {
            padding: 2.5rem 0; border-top: 1px solid var(--border);
            text-align: center; color: var(--text-dim);
            font-size: 0.82rem; position: relative; z-index: 1;
        }
        footer a { color: var(--primary); text-decoration: none; }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar-links { display: none; }
            .blog-hero { padding: 7rem 0 3rem; }
            .posts-grid { grid-template-columns: 1fr; }
            .filter-bar { padding: 0 1.25rem; }
        }
        @media (max-width: 480px) {
            .container { padding: 0 1.25rem; }
            #search-input { width: 100%; }
            .filter-bar { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="navbar-brand">sudharshan.dev</a>
        <ul class="navbar-links">
            <li><a href="index.html"><i class="fas fa-home" style="margin-right:0.3rem;font-size:0.75rem"></i>Home</a></li>
            <li><a href="index.html#projects">Projects</a></li>
            <li><a href="blog_admin.html"><i class="fas fa-edit" style="margin-right:0.3rem;font-size:0.75rem"></i>Admin</a></li>
        </ul>
    </nav>

    <div class="blog-hero">
        <span class="blog-hero-label">Writing</span>
        <h1>My Daily <span class="gradient-text">Learning Journal</span></h1>
        <p>Documenting my journey through programming, systems, DSA, and tech discoveries.</p>
    </div>

    <div class="filter-bar">
        <span class="post-count" id="post-count">Loading…</span>
        <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="search-input" placeholder="Search posts…">
        </div>
    </div>

    <section class="blog-section">
        <div class="container">
            <div class="posts-grid" id="posts-grid">
                <div class="state-msg"><div class="spinner"></div></div>
            </div>
        </div>
    </section>

    <a href="blog_admin.html" class="admin-fab" title="Write a new post">
        <i class="fas fa-plus"></i>
    </a>

    <footer>
        <div class="container">
            <p><a href="index.html">← Back to portfolio</a> &nbsp;·&nbsp; © 2025 Sudharshan Hegde</p>
        </div>
    </footer>

    <script>
        let allPosts = [];

        function renderPosts(posts) {
            const grid = document.getElementById('posts-grid');
            const count = document.getElementById('post-count');
            grid.innerHTML = '';
            count.textContent = `${posts.length} post${posts.length !== 1 ? 's' : ''}`;

            if (!posts.length) {
                grid.innerHTML = '<div class="state-msg">No posts found.</div>';
                return;
            }

            posts.forEach(p => {
                const d = new Date(p.date).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
                const tags = (p.tags || []).slice(0,3).map(t => `<span class="card-tag">${t}</span>`).join('');
                const a = document.createElement('a');
                a.href = p.filename; a.className = 'blog-card';
                a.innerHTML = `
                    <div class="card-meta">
                        <span class="card-date">${d}</span>
                        <div class="card-tags">${tags}</div>
                    </div>
                    <h3>${p.title}</h3>
                    <p>${p.excerpt}</p>
                    <span class="read-link">Read more <i class="fas fa-arrow-right" style="font-size:0.7rem"></i></span>
                `;
                grid.appendChild(a);
            });
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const resp = await fetch('posts.json?v=' + Date.now());
                allPosts = await resp.json();
                allPosts.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderPosts(allPosts);
            } catch(err) {
                document.getElementById('posts-grid').innerHTML =
                    `<div class="state-msg">Failed to load posts. <br><small>${err.message}</small></div>`;
            }
        });

        document.getElementById('search-input').addEventListener('input', function() {
            const q = this.value.toLowerCase().trim();
            if (!q) { renderPosts(allPosts); return; }
            const filtered = allPosts.filter(p =>
                p.title.toLowerCase().includes(q) ||
                p.excerpt.toLowerCase().includes(q) ||
                (p.tags || []).some(t => t.toLowerCase().includes(q))
            );
            renderPosts(filtered);
        });
    </script>
</body>
</html>

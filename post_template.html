<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} — Sudharshan Hegde</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Fira+Code:wght@400;500;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="blog-post.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="navbar-brand">sudharshan.dev</a>
        <ul class="nav-links">
            <li><a href="index.html"><i class="fas fa-home"></i><span> Home</span></a></li>
            <li><a href="blog.html"><i class="fas fa-book-open"></i><span> Blog</span></a></li>
        </ul>
    </nav>

    <div class="post-hero">
        <div class="container">
            <div class="post-meta-top">
                <span class="post-date-badge">{{DATE}}</span>
                {{TAGS}}
            </div>
            <h1 class="post-title">{{TITLE}}</h1>
            <p class="post-excerpt-lead">{{EXCERPT}}</p>
        </div>
    </div>

    <div class="post-wrapper">
        <div class="container">
            <article class="post-container">
                <div class="post-content">
                    {{CONTENT}}
                </div>
                <a href="blog.html" class="back-link">
                    <i class="fas fa-arrow-left"></i> Back to Blog
                </a>
            </article>
        </div>
    </div>

    <footer>
        <div class="container">
            <p>© 2025 Sudharshan Hegde &nbsp;·&nbsp; <a href="index.html">Portfolio</a> &nbsp;·&nbsp; <a href="blog.html">Blog</a></p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-java.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-c.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-cpp.min.js"></script>
</body>
</html>
